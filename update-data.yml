name: Autonomous AI Analyst Daily Update

on:
  schedule:
    # Runs at 00:00 and 12:00 UTC every day
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab

jobs:
  run-analyst:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push commits back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Autonomous AI Analyst
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: npm run update-data

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "AI Underwriting Analyst"
          git config --global user.email "bot@insurance-eagle-eye.local"
          git add data/market-data.js
          
          # Only commit if git detects changes to the file
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-Update: Latest AI Intelligence Gathered" && git push)
